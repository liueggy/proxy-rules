name: Build proxy rules

on:
  push:
    paths:
      - source/rules.yaml
      - scripts/build.py
      - .github/workflows/build-rules.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install PyYAML

      - name: Build rules
        run: python scripts/build.py

      - name: Commit generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'build: generate proxy rules'
          file_pattern: 'quantumult-x/** stash/** loon/**'
