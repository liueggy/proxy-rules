# 统一源规则
# 运行 scripts/build.py 后自动生成 Quantumult X / Stash / Loon 三端规则。
# policy 为最终策略组名：DIRECT / Proxy / AI / Apple / REJECT 等。

meta:
  owner: liueggy
  repo: proxy-rules
  default_policy: Proxy
  update_interval: 86400

categories:
  direct-servers:
    name: 自有服务器直连
    policy: DIRECT
    description: ocean / Hermes / toy 三台自有服务器，避免 SSH 和服务访问被代理绕路。
    rules:
      - type: IP-CIDR
        value: 167.71.221.110/32
        options: no-resolve
        comment: ocean - ROS 中继 + chatgpt2api
      - type: IP-CIDR
        value: 168.144.136.246/32
        options: no-resolve
        comment: Hermes - sub2api + MTProxy + Xray
      - type: IP-CIDR
        value: 167.71.214.73/32
        options: no-resolve
        comment: toy - eggy-ros-relay + chatgpt2api

  ai:
    name: AI 服务
    policy: AI
    rules:
      - DOMAIN-SUFFIX,openai.com
      - DOMAIN-SUFFIX,chatgpt.com
      - DOMAIN-SUFFIX,oaistatic.com
      - DOMAIN-SUFFIX,oaiusercontent.com
      - DOMAIN-SUFFIX,anthropic.com
      - DOMAIN-SUFFIX,claude.ai
      - DOMAIN-SUFFIX,perplexity.ai
      - DOMAIN-SUFFIX,gemini.google.com

  github:
    name: GitHub
    policy: Proxy
    rules:
      - DOMAIN-SUFFIX,github.com
      - DOMAIN-SUFFIX,githubusercontent.com
      - DOMAIN-SUFFIX,githubassets.com
      - DOMAIN-SUFFIX,github.io

  telegram:
    name: Telegram
    policy: Proxy
    rules:
      - DOMAIN-SUFFIX,t.me
      - DOMAIN-SUFFIX,telegram.org
      - type: IP-CIDR
        value: 91.108.4.0/22
        options: no-resolve
      - type: IP-CIDR
        value: 91.108.8.0/22
        options: no-resolve
      - type: IP-CIDR
        value: 91.108.12.0/22
        options: no-resolve
      - type: IP-CIDR
        value: 91.108.16.0/22
        options: no-resolve
      - type: IP-CIDR
        value: 91.108.56.0/22
        options: no-resolve
      - type: IP-CIDR
        value: 149.154.160.0/20
        options: no-resolve

  apple:
    name: Apple 服务
    policy: Apple
    description: 可按需要把 policy 从 Apple 改为 DIRECT。
    rules:
      - DOMAIN-SUFFIX,apple.com
      - DOMAIN-SUFFIX,icloud.com
      - DOMAIN-SUFFIX,cdn-apple.com

external_sources:
  blackmatrix7:
    name: blackmatrix7/ios_rule_script
    homepage: https://github.com/blackmatrix7/ios_rule_script
    branch: master
    base:
      qx: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/QuantumultX
      loon: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Loon
      stash: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash
    items:
      advertising-lite:
        name: AdvertisingLite
        policy: REJECT
        description: 轻量广告拦截
      openai:
        name: OpenAI
        policy: AI
      claude:
        name: Claude
        policy: AI
      gemini:
        name: Gemini
        policy: AI
      github:
        name: GitHub
        policy: Proxy
      telegram:
        name: Telegram
        policy: Proxy
      youtube:
        name: YouTube
        policy: Streaming
      netflix:
        name: Netflix
        policy: Streaming
      disney:
        name: Disney
        policy: Streaming
      spotify:
        name: Spotify
        policy: Streaming
      apple:
        name: Apple
        policy: Apple

final:
  qx:
    - GEOIP,CN,DIRECT
    - FINAL,Proxy
  loon:
    - GEOIP,CN,DIRECT
    - FINAL,Proxy
  stash:
    - GEOIP,CN,DIRECT
    - MATCH,Proxy
