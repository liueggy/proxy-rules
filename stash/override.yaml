# Stash Override 模板
# 用法：Stash → Override → 添加远程覆写

name: Proxy Rules Override

rule-providers:
  eggy-custom:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/liueggy/proxy-rules/main/stash/rules.yaml
    path: ./ruleset/eggy-custom.yaml
    interval: 86400

rules:
  # 自有服务器直连
  # ocean: ROS 中继 + chatgpt2api
  - IP-CIDR,167.71.221.110/32,DIRECT,no-resolve
  # Hermes: sub2api + MTProxy + Xray
  - IP-CIDR,168.144.136.246/32,DIRECT,no-resolve
  # toy: eggy-ros-relay + chatgpt2api
  - IP-CIDR,167.71.214.73/32,DIRECT,no-resolve

  - RULE-SET,eggy-custom,Proxy
  - GEOIP,CN,DIRECT
  - MATCH,Proxy
