# Stash Override：外部开源规则源
# 来源：https://github.com/blackmatrix7/ios_rule_script
# 用法：Stash → Override → 添加远程覆写

name: External Rule Providers

rule-providers:
  eggy-custom:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/liueggy/proxy-rules/main/stash/rules/direct-servers.yaml
    path: ./ruleset/eggy/direct-servers.yaml
    interval: 86400
  bm7-openai:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml
    path: ./ruleset/blackmatrix7/openai.yaml
    interval: 86400
  bm7-claude:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml
    path: ./ruleset/blackmatrix7/claude.yaml
    interval: 86400
  bm7-gemini:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml
    path: ./ruleset/blackmatrix7/gemini.yaml
    interval: 86400
  bm7-github:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    path: ./ruleset/blackmatrix7/github.yaml
    interval: 86400
  bm7-telegram:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    path: ./ruleset/blackmatrix7/telegram.yaml
    interval: 86400
  bm7-youtube:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
    path: ./ruleset/blackmatrix7/youtube.yaml
    interval: 86400
  bm7-netflix:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml
    path: ./ruleset/blackmatrix7/netflix.yaml
    interval: 86400
  bm7-disney:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.yaml
    path: ./ruleset/blackmatrix7/disney.yaml
    interval: 86400
  bm7-spotify:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.yaml
    path: ./ruleset/blackmatrix7/spotify.yaml
    interval: 86400
  bm7-apple:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml
    path: ./ruleset/blackmatrix7/apple.yaml
    interval: 86400
  bm7-ads-lite:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AdvertisingLite/AdvertisingLite.yaml
    path: ./ruleset/blackmatrix7/ads-lite.yaml
    interval: 86400

rules:
  # 自己维护的直连规则优先级最高
  - RULE-SET,eggy-custom,DIRECT

  # 广告拦截
  - RULE-SET,bm7-ads-lite,REJECT

  # AI
  - RULE-SET,bm7-openai,AI
  - RULE-SET,bm7-claude,AI
  - RULE-SET,bm7-gemini,AI

  # 开发 / 通讯
  - RULE-SET,bm7-github,Proxy
  - RULE-SET,bm7-telegram,Proxy

  # 流媒体
  - RULE-SET,bm7-youtube,Streaming
  - RULE-SET,bm7-netflix,Streaming
  - RULE-SET,bm7-disney,Streaming
  - RULE-SET,bm7-spotify,Streaming

  # Apple
  - RULE-SET,bm7-apple,Apple

  - GEOIP,CN,DIRECT
  - MATCH,Proxy
